<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - IHBB Practice Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style id="auth-guard">
        body {
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
    </style>
    <script src="profile.js" defer></script>
</head>

<body>
    <div class="shell">
        <header class="brand" style="margin-bottom: 24px;">
            <div class="logo">HB</div>
            <h1 id="profile-heading" style="flex: 1;">Profile</h1>
            <div class="row right" style="gap: 12px;">
                <a id="btn-back-dashboard" href="index.html" class="btn ghost" style="text-decoration: none;">←
                    Dashboard</a>
                <a href="#" id="btn-logout" class="btn bad" style="text-decoration: none;">Logout</a>
            </div>
        </header>

        <div id="alert-box" class="alert hidden"></div>

        <section id="profile-main" class="view active">
            <div class="card">
                <h2 id="profile-title" class="card-title" style="margin-bottom: 10px;">Loading profile...</h2>
                <p id="profile-subtitle" class="muted" style="margin-bottom: 22px;">Please wait.</p>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Display Name</label>
                        <input id="pf-display-name" type="text" readonly>
                    </div>
                    <div class="input-group">
                        <label>Role</label>
                        <input id="pf-role" type="text" readonly>
                    </div>
                    <div class="input-group">
                        <label>Class Code</label>
                        <input id="pf-class-code" type="text" readonly>
                    </div>
                    <div class="input-group">
                        <label>Created At</label>
                        <input id="pf-created-at" type="text" readonly>
                    </div>
                    <div class="input-group full-width">
                        <label>User ID</label>
                        <input id="pf-user-id" type="text" readonly>
                    </div>
                </div>

                <div class="sep"></div>
                <h3 style="margin: 0 0 8px 0;">Student Data</h3>
                <p class="muted" style="margin: 0;">Coming soon. We can add additional student data fields here later.
                </p>
            </div>
        </section>
    </div>
</body>

</html>
