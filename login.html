<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IHBB Premium Drill</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="login.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js" defer></script>
    <script src="login.js" defer></script>
</head>

<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">IH</div>
            <h1>Welcome Back</h1>
            <p>Sign in to access IHBB Premium Drill</p>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <!-- Mode Toggle (Login vs Sign up vs Magic Link) -->
        <div class="auth-tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="auth-form" class="auth-form">
            <div class="input-group">
                <label for="email">Email address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>

            <div class="input-group" id="password-group">
                <div class="password-header">
                    <label for="password">Password</label>
                    <a href="#" id="forgot-password" class="text-sm">Forgot password?</a>
                </div>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <div class="input-group hidden" id="class-code-group">
                <label for="class-code">Class Code (Optional)</label>
                <input type="text" id="class-code" placeholder="e.g. MATH2026">
                <small class="text-sm muted">Students: enter code provided by teacher</small>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary">Sign In</button>
        </form>

        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-auth">
            <button id="btn-google" type="button" class="btn btn-social">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Google
            </button>
            <button id="btn-microsoft" type="button" class="btn btn-social">
                <svg viewBox="0 0 21 21" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022" />
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
                </svg>
                Microsoft
            </button>
        </div>

        <div class="magic-link-section">
            <button id="btn-magic-link" type="button" class="btn btn-ghost">Send Magic Link (Passwordless)</button>
        </div>
    </div>
</body>

</html>
